<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos — Patas & Caos</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --terracota: #C4622D;
    --cream: #F5ECD7;
    --negro: #1A1A1A;
    --dark: #1C1007;
    --card-bg: #FAF4EA;
    --blanco: #fff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Poppins', sans-serif; background: var(--cream); color: var(--negro); min-height: 100vh; }

  /* LOGIN */
  #login-screen { position: fixed; inset: 0; background: var(--dark); display: flex; align-items: center; justify-content: center; z-index: 999; }
  .login-box { background: var(--cream); border-radius: 20px; padding: 2.5rem 2rem; width: 100%; max-width: 360px; text-align: center; }
  .login-box img { width: 48px; margin-bottom: 1rem; }
  .login-box h2 { font-size: 1.2rem; font-weight: 900; margin-bottom: .4rem; }
  .login-box p { font-size: .82rem; color: #6b5a4e; margin-bottom: 1.5rem; }
  .login-box input { width: 100%; border: 1.5px solid rgba(28,16,7,.15); border-radius: 10px; padding: 11px 14px; font-family: 'Poppins', sans-serif; font-size: .9rem; outline: none; margin-bottom: 1rem; }
  .login-box input:focus { border-color: var(--terracota); }
  .login-box button { width: 100%; background: var(--terracota); color: #fff; border: none; border-radius: 50px; padding: 12px; font-family: 'Poppins', sans-serif; font-weight: 700; font-size: .9rem; cursor: pointer; transition: background .2s; }
  .login-box button:hover { background: #a8501f; }
  .login-error { font-size: .78rem; color: #e74c3c; margin-top: .5rem; display: none; }

  /* PANEL */
  #panel { display: none; }
  header { background: var(--dark); padding: 1rem 5%; display: flex; align-items: center; justify-content: space-between; }
  .header-brand { display: flex; align-items: center; gap: 10px; }
  .header-brand img { width: 36px; height: 36px; }
  .header-brand span { font-weight: 700; color: var(--cream); font-size: .95rem; }
  .header-title { color: var(--cream); font-size: .82rem; opacity: .6; }

  main { padding: 2rem 5%; max-width: 1200px; margin: 0 auto; }

  /* STATS */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
  .stat-card { background: var(--blanco); border-radius: 14px; padding: 1.25rem; border: 1px solid rgba(28,16,7,.08); }
  .stat-label { font-size: .72rem; font-weight: 600; color: #8a7a6e; text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
  .stat-value { font-size: 1.6rem; font-weight: 900; color: var(--negro); }
  .stat-value.terracota { color: var(--terracota); }

  /* FILTROS */
  .filtros { display: flex; gap: .6rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .filtro-btn { border: 1.5px solid rgba(28,16,7,.15); background: none; border-radius: 50px; padding: 6px 16px; font-family: 'Poppins', sans-serif; font-size: .78rem; font-weight: 600; cursor: pointer; color: #6b5a4e; transition: all .2s; }
  .filtro-btn.activo { background: var(--terracota); border-color: var(--terracota); color: #fff; }

  /* TABLA */
  .tabla-wrap { background: var(--blanco); border-radius: 16px; border: 1px solid rgba(28,16,7,.08); overflow: hidden; }
  .tabla-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid rgba(28,16,7,.06); display: flex; align-items: center; justify-content: space-between; }
  .tabla-header h2 { font-size: 1rem; font-weight: 700; }
  .btn-refresh { background: none; border: 1.5px solid rgba(28,16,7,.15); border-radius: 50px; padding: 6px 14px; font-family: 'Poppins', sans-serif; font-size: .78rem; font-weight: 600; cursor: pointer; color: #6b5a4e; transition: all .2s; display: flex; align-items: center; gap: 6px; }
  .btn-refresh:hover { border-color: var(--terracota); color: var(--terracota); }

  table { width: 100%; border-collapse: collapse; }
  th { font-size: .7rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #8a7a6e; padding: .9rem 1.5rem; text-align: left; border-bottom: 1px solid rgba(28,16,7,.06); background: #fdf8f2; }
  td { padding: .9rem 1.5rem; font-size: .84rem; border-bottom: 1px solid rgba(28,16,7,.04); vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fdf8f2; }

  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: .72rem; font-weight: 700; }
  .badge-pendiente { background: #fff3cd; color: #856404; }
  .badge-despachado { background: #d1ecf1; color: #0c5460; }
  .badge-entregado { background: #d4edda; color: #155724; }

  .estado-select { border: 1.5px solid rgba(28,16,7,.12); border-radius: 8px; padding: 4px 8px; font-family: 'Poppins', sans-serif; font-size: .78rem; font-weight: 600; cursor: pointer; background: #fff; outline: none; transition: border-color .2s; }
  .estado-select:focus { border-color: var(--terracota); }

  .cliente-nombre { font-weight: 700; margin-bottom: 2px; }
  .cliente-detalle { font-size: .76rem; color: #6b5a4e; }

  .productos-lista { font-size: .78rem; color: #4a3a2e; line-height: 1.6; }
  .total-valor { font-weight: 800; color: var(--terracota); }

  .fecha-texto { font-size: .78rem; color: #8a7a6e; }

  .empty-state { padding: 3rem; text-align: center; color: #8a7a6e; }
  .empty-state span { display: block; font-size: 2.5rem; margin-bottom: 1rem; }

  .loading { padding: 3rem; text-align: center; color: #8a7a6e; font-size: .9rem; }

  @media (max-width: 768px) {
    th:nth-child(4), td:nth-child(4),
    th:nth-child(5), td:nth-child(5) { display: none; }
    main { padding: 1.5rem 4%; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <img src="logo.png" alt="Patas & Caos">
    <h2>Panel de Pedidos</h2>
    <p>Ingresa la contraseña para continuar</p>
    <input type="password" id="pwd-input" placeholder="Contraseña" onkeydown="if(event.key==='Enter') verificarPass()">
    <button onclick="verificarPass()">Entrar</button>
    <p class="login-error" id="login-error">Contraseña incorrecta</p>
  </div>
</div>

<!-- PANEL -->
<div id="panel">
  <header>
    <div class="header-brand">
      <img src="logo.png" alt="Patas & Caos">
      <span>Patas & Caos</span>
    </div>
    <span class="header-title">Panel de Pedidos</span>
  </header>

  <main>
    <div class="stats" id="stats">
      <div class="stat-card">
        <div class="stat-label">Total pedidos</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pendientes</div>
        <div class="stat-value terracota" id="stat-pendientes">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Despachados</div>
        <div class="stat-value" id="stat-despachados">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Entregados</div>
        <div class="stat-value" id="stat-entregados">—</div>
      </div>
    </div>

    <div class="filtros">
      <button class="filtro-btn activo" onclick="filtrar('todos', this)">Todos</button>
      <button class="filtro-btn" onclick="filtrar('pendiente', this)">Pendientes</button>
      <button class="filtro-btn" onclick="filtrar('despachado', this)">Despachados</button>
      <button class="filtro-btn" onclick="filtrar('entregado', this)">Entregados</button>
    </div>

    <div class="tabla-wrap">
      <div class="tabla-header">
        <h2>Pedidos</h2>
        <button class="btn-refresh" onclick="cargarPedidos()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          Actualizar
        </button>
      </div>
      <div id="tabla-contenido">
        <div class="loading">Cargando pedidos...</div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPA_URL = 'https://xintmnshndhtqqbouxbo.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhpbnRtbnNobmRodHFxYm91eGJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMDc2MTAsImV4cCI6MjA5MzU4MzYxMH0.Xl5eHoNoxLrb_8jK40zPL52Qa3t696QHkaAmyJEqJac';
const _sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);

let todosLosPedidos = [];
let filtroActual = 'todos';

function verificarPass() {
  const val = document.getElementById('pwd-input').value;
  if (val === '290966') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('panel').style.display = 'block';
    cargarPedidos();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

async function cargarPedidos() {
  document.getElementById('tabla-contenido').innerHTML = '<div class="loading">Cargando pedidos...</div>';
  try {
    const { data, error } = await _sb
      .from('Pedidos')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) throw error;
    todosLosPedidos = data || [];
    actualizarStats();
    renderTabla();
  } catch (e) {
    document.getElementById('tabla-contenido').innerHTML = '<div class="empty-state"><span>⚠️</span>Error al cargar los pedidos. Intenta de nuevo.</div>';
  }
}

function actualizarStats() {
  document.getElementById('stat-total').textContent = todosLosPedidos.length;
  document.getElementById('stat-pendientes').textContent = todosLosPedidos.filter(p => p.estado === 'pendiente').length;
  document.getElementById('stat-despachados').textContent = todosLosPedidos.filter(p => p.estado === 'despachado').length;
  document.getElementById('stat-entregados').textContent = todosLosPedidos.filter(p => p.estado === 'entregado').length;
}

function filtrar(estado, btn) {
  filtroActual = estado;
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('activo'));
  btn.classList.add('activo');
  renderTabla();
}

function renderTabla() {
  const pedidos = filtroActual === 'todos'
    ? todosLosPedidos
    : todosLosPedidos.filter(p => p.estado === filtroActual);

  if (pedidos.length === 0) {
    document.getElementById('tabla-contenido').innerHTML = '<div class="empty-state"><span>🐾</span>No hay pedidos en esta categoría.</div>';
    return;
  }

  const rows = pedidos.map(p => {
    const fecha = new Date(p.created_at).toLocaleDateString('es-CL', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    const totalFmt = p.total ? `$${p.total.toLocaleString('es-CL')}` : '—';
    return `<tr>
      <td>
        <div class="cliente-nombre">${p.nombre || '—'}</div>
        <div class="cliente-detalle">${p.email || ''}</div>
        <div class="cliente-detalle">${p.telefono || ''}</div>
      </td>
      <td>
        <div class="cliente-detalle">${p.direccion || ''}</div>
        <div class="cliente-detalle">${p.comuna || ''}, ${p.ciudad || ''}</div>
        ${p.notas ? `<div class="cliente-detalle" style="font-style:italic">📝 ${p.notas}</div>` : ''}
      </td>
      <td><div class="productos-lista">${(p.productos || '').replace(/,\s*/g, '<br>')}</div></td>
      <td><span class="total-valor">${totalFmt}</span><br><span class="fecha-texto">${p.documento || 'Boleta'}</span></td>
      <td><span class="fecha-texto">${fecha}</span></td>
      <td>
        <select class="estado-select" onchange="cambiarEstado(${p.id}, this.value)">
          <option value="pendiente" ${p.estado === 'pendiente' ? 'selected' : ''}>⏳ Pendiente</option>
          <option value="despachado" ${p.estado === 'despachado' ? 'selected' : ''}>🚚 Despachado</option>
          <option value="entregado" ${p.estado === 'entregado' ? 'selected' : ''}>✅ Entregado</option>
        </select>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('tabla-contenido').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Cliente</th>
          <th>Dirección</th>
          <th>Productos</th>
          <th>Total</th>
          <th>Fecha</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

async function cambiarEstado(id, nuevoEstado) {
  const { error } = await _sb
    .from('Pedidos')
    .update({ estado: nuevoEstado })
    .eq('id', id);

  if (error) {
    alert('Error al actualizar el estado. Intenta de nuevo.');
    return;
  }
  const pedido = todosLosPedidos.find(p => p.id === id);
  if (pedido) pedido.estado = nuevoEstado;
  actualizarStats();
}
</script>
</body>
</html>
